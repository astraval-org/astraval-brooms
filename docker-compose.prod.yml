services:
  astraval-brooms:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "80:80"
    container_name: astraval-brooms-prod
    restart: always
    environment:
      - NODE_ENV=production
    networks:
      - astraval-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.astraval.rule=Host(`brooms.astraval.com`)"

networks:
  astraval-network:
    driver: bridge